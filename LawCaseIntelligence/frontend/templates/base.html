<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}LawCaseIntelligence{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT:'#16a34a', dark:'#15803d', light:'#dcfce7' },
            surface:'#0f172a', card:'#1e293b', border:'#334155'
          }
        }
      }
    }
  </script>
  <style>
    body { background:#0f172a; color:#e2e8f0; font-family:'Inter',sans-serif; }
    .card { background:#1e293b; border:1px solid #334155; border-radius:12px; }
    .btn-primary { background:#16a34a; color:#fff; padding:10px 20px; border-radius:8px;
                   font-weight:600; transition:background .2s; cursor:pointer; border:none; }
    .btn-primary:hover { background:#15803d; }
    .btn-outline { border:1px solid #334155; color:#94a3b8; padding:8px 16px;
                   border-radius:8px; font-weight:500; transition:all .2s; cursor:pointer; background:transparent; }
    .btn-outline:hover { border-color:#16a34a; color:#16a34a; }
    .badge-done       { background:#14532d; color:#86efac; padding:3px 10px; border-radius:20px; font-size:12px; }
    .badge-processing { background:#1e3a5f; color:#93c5fd; padding:3px 10px; border-radius:20px; font-size:12px; animation:pulse 1.5s infinite; }
    .badge-queued     { background:#2d2015; color:#fcd34d; padding:3px 10px; border-radius:20px; font-size:12px; }
    .badge-failed     { background:#450a0a; color:#fca5a5; padding:3px 10px; border-radius:20px; font-size:12px; }
    .badge-pending    { background:#1e293b; color:#64748b; padding:3px 10px; border-radius:20px; font-size:12px; }
    .flash-success { background:#14532d; border:1px solid #16a34a; color:#86efac; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
    .flash-error   { background:#450a0a; border:1px solid #dc2626; color:#fca5a5; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
    input, textarea, select { background:#0f172a; border:1px solid #334155; color:#e2e8f0;
                               padding:10px 14px; border-radius:8px; width:100%; outline:none; transition:border .2s; }
    input:focus, textarea:focus, select:focus { border-color:#16a34a; }
    input.error, textarea.error { border-color:#dc2626; }
    .progress-bar  { height:6px; background:#1e293b; border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#16a34a,#22d3ee);
                     border-radius:3px; transition:width .4s ease; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    .dot          { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .dot-running  { background:#3b82f6; animation:pulse 1s infinite; }
    .dot-done     { background:#16a34a; }
    .dot-waiting  { background:#334155; }
    .dot-error    { background:#ef4444; }
    .drop-zone { border:2px dashed #334155; border-radius:12px; padding:40px;
                 text-align:center; transition:all .2s; cursor:pointer; }
    .drop-zone.dragover { border-color:#16a34a; background:#0d2414; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav style="background:#1e293b; border-bottom:1px solid #334155; padding:14px 24px;
            display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50;">
  <a href="/" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
    <div style="width:36px;height:36px;background:#16a34a;border-radius:8px;display:flex;
                align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;">LC</div>
    <span style="font-weight:700;font-size:18px;color:#f1f5f9;">LawCase</span><span style="font-weight:700;font-size:18px;color:#16a34a;">Intelligence</span>
    <span style="color:#64748b;font-size:13px;margin-left:4px;">Legal AI</span>
  </a>
  <div style="display:flex;gap:12px;">
    <a href="/" class="btn-outline" style="text-decoration:none;font-size:14px;">🏠 Home</a>
    <a href="/project/new" class="btn-primary" style="text-decoration:none;font-size:14px;">+ New Project</a>
  </div>
</nav>

<!-- Main -->
<main style="max-width:1200px; margin:0 auto; padding:32px 24px;">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>

<script>{% block scripts %}{% endblock %}</script>
</body>
</html>
